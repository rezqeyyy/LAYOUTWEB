<body>

    <header>
        <div class="container navbar">

        <div class="grid-2">
            <div>
                <h3 class="mb-2">Kirim Pesan</h3>
                <form action="#">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama Anda">

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="contoh@email.com">
                    </div>
                    <div class="form-group">
                        <label for="pesan">Pesan</label>
                        <textarea id="pesan" rows="5" placeholder="Tulis pesan Anda di sini..."></textarea>
                    </div>
                    <button type="button" class="btn">Kirim Sekarang</button>
                </form>
            </div>
            
            <div>
                <h3 class="mb-2">Informasi Kontak</h3>
                <p class="mb-2"><strong>Alamat:</strong> Jl. Dummy Raya No. 123, Jakarta, Indonesia</p>
                <p class="mb-2"><strong>Telepon:</strong> +62 812 3456 7890</p>
                <p class="mb-4"><strong>Email:</strong> info@perusahaan.com</p>
